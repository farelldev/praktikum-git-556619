<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lapangin - Hero Section</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800;900&display=swap" rel="stylesheet" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html{
        font-family: 'Inter', sans-serif;
        }

        nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 2rem 5vw;
        position: sticky;
        top: 0;
        z-index: 5;
        border-bottom: 1px solid black;
        background-color: white;
        }

        .nav-logo {
        font-size: 1.15rem;
        font-weight: 800;
        letter-spacing: -0.03em;
        color: black;
        text-decoration: none;
        }

        .nav-logo span {
        color: #696969;
        }

        .nav-links {
        display: flex;
        gap: 2rem;
        list-style: none;
        }

        .nav-links a {
        color: #B0B0B0;
        text-decoration: none;
        font-size: 0.875rem;
        font-weight: 500;
        transition: color 0.2s;
        }

        .nav-links a:hover {
        color: black;
        }
    
        .hero {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 3rem 5vw 5rem;
        gap: 3.5rem;
        }     

        .split {
        display: flex;
        flex-direction: row;
        gap: 3.5rem;
        align-items: center;
        width: 100%;
        max-width: 1200px;
        }

        .left {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        }

        .right {
        flex: 1;
        position: relative;
        }

        .img-wrapper {
        position: relative;
        border-radius: var(--radius-img);
        overflow: hidden;
        aspect-ratio: 4 / 3;
        }

        .img-wrapper img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        }

        .cta-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.65rem;
        background-color: black;
        color: white;
        font-size: 1rem;
        font-weight: 800;
        padding: 1rem 2.5rem;
        border-radius: 100px;
        border: none;
        cursor: pointer;
        text-decoration: none;
        }

        @media (max-width: 768px) {
        .split {
            flex-direction: column;
            gap: 2.5rem;
        }

        .left {
            order: 1;
        }

        .right {
            order: 2;
            width: 100%;
        }

        .cta-btn {
            font-size: 0.95rem;
            padding: 0.9rem 2rem;
        }
        }
    </style>
</head>
<body>
    <nav>
        <a class="nav-logo" href="#">Lapang<span>in</span></a>
        <ul class="nav-links">
        <li><a href="#">Fasilitas</a></li>
        <li><a href="#">Jadwal</a></li>
        <li><a href="#">Harga</a></li>
        <li><a href="#">Kontak</a></li>
        </ul>
    </nav>

    <section class="hero">
        <div class="split">
            <div class="left">
                <h1>Arena Terbaik<br>
                untuk Bamdinton</span><br>
                & Futsal-mu</h1>
                <p>Reservasi lapangan premium dengan mudah dan cepat.
                    Tersedia berbagai lapangan badminton dan futsal premium. Siap setiap hari.
                </p>
            </div>
            <div class="right">
                <div class="img-wrapper">
                <img 
                    src="https://images.unsplash.com/photo-1626224583764-f87db24ac4ea?w=900&q=80&auto=format&fit=crop"
                    alt="Lapangan Badminton Premium">
                </div>
            </div>
        </div>

        <a class="cta-btn" href="#">
            Pesan Lapangan Sekarang →
        </a>
    </section>
</body>
</html>
