<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lapangin - Hero Section</title>

    <style>
        .hero {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 3rem 5vw 5rem;
        gap: 3.5rem;
        }     

        .split {
        display: flex;
        flex-direction: row;
        gap: 3.5rem;
        align-items: center;
        width: 100%;
        max-width: 1200px;
        }

        .left {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        }

        .right {
        flex: 1;
        position: relative;
        }

        .img-wrapper {
        position: relative;
        border-radius: var(--radius-img);
        overflow: hidden;
        aspect-ratio: 4 / 3;
        }

        .img-wrapper img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        }

        .cta-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.65rem;
        background-color: black;
        color: white;
        font-size: 1rem;
        font-weight: 800;
        padding: 1rem 2.5rem;
        border-radius: 100px;
        border: none;
        cursor: pointer;
        text-decoration: none;
        }
    </style>
</head>
<body>
    <section class="hero">
        <div class="split">
            <div class="left">
                <h1>Arena Terbaik<br>
                untuk Badminton</span><br>
                & Futsal-mu</h1>
                <p>Reservasi lapangan premium dengan mudah dan cepat.
                    Tersedia berbagai lapangan badminton dan futsal premium. Siap setiap hari.
                </p>
            </div>
            <div class="right">
                <div class="img-wrapper">
                <img 
                    src="https://images.unsplash.com/photo-1626224583764-f87db24ac4ea?w=900&q=80&auto=format&fit=crop"
                    alt="Lapangan Badminton Premium">
                </div>
            </div>
        </div>

        <a class="cta-btn" href="#">
            Pesan Lapangan Sekarang
        </a>
    </section>
</body>
</html>
